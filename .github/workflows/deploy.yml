name: Deploy to AWS EC2

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Verify secrets exist
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "EC2_HOST is empty!"; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "EC2_USER is empty!"; fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "EC2_SSH_KEY is empty!"; fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/seh-nya
            git pull origin main
            ~/.bun/bin/bun install
            ~/.bun/bin/bun run build
            sudo systemctl restart sehnya
